name: Update Cangjie Dockerfiles

on:
  workflow_dispatch:
    inputs:
      force:
        description: Overwrite every committed Dockerfile
        required: false
        type: boolean
        default: false
      force_version:
        description: Overwrite Dockerfiles for a single version (e.g. 1.0.5)
        required: false
        type: string
        default: ""
  schedule:
    - cron: "7 3 * * *"

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: update-cangjie-versions
  cancel-in-progress: false

jobs:
  generate:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@v6.2.0
        with:
          python-version-file: .python-version

      - name: Install uv
        uses: astral-sh/setup-uv@v8.1.0
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync --locked --no-dev

      - name: Generate Dockerfiles
        id: generate
        env:
          CANGJIE_GENERATE_FORCE: ${{ inputs.force || 'false' }}
          CANGJIE_GENERATE_FORCE_VERSION: ${{ inputs.force_version || '' }}
        run: |
          uv run cangjie-images generate --versions-root versions
          echo "changed=$(git status --porcelain versions | wc -l)" >> "$GITHUB_OUTPUT"

      - name: Open pull request
        if: steps.generate.outputs.changed != '0'
        uses: peter-evans/create-pull-request@v7.0.8
        with:
          branch: auto/update-versions
          base: master
          commit-message: "chore(versions): regenerate Dockerfiles"
          title: "chore(versions): add/update Cangjie Dockerfiles"
          body: |
            Auto-generated by `cangjie-images generate`.

            Trigger: `${{ github.event_name }}`
            Force: `${{ inputs.force || 'false' }}`
            Force version: `${{ inputs.force_version || '-' }}`

            Review the diff and merge to publish new images.
          labels: automated, versions
          delete-branch: true
