name: Publish Docker Images

on:
  workflow_dispatch:
    inputs:
      include_nightly:
        description: Include nightly images
        required: false
        type: boolean
        default: true
      force:
        description: Republish all generated variants
        required: false
        type: boolean
        default: false
  schedule:
    - cron: "17 */6 * * *"

permissions:
  contents: read

concurrency:
  group: publish-cangjie-images
  cancel-in-progress: false

env:
  IMAGE_NAME: zxilly/cangjie

jobs:
  analyze:
    runs-on: ubuntu-24.04
    outputs:
      has_work: ${{ steps.plan.outputs.has_work }}
      build_matrix: ${{ steps.plan.outputs.build_matrix }}
      publish_matrix: ${{ steps.plan.outputs.publish_matrix }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2

      - name: Set up Python
        uses: actions/setup-python@v6.2.0
        with:
          python-version-file: .python-version

      - name: Install uv
        uses: astral-sh/setup-uv@v8.1.0
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync --locked --dev

      - name: Analyze pending releases
        id: plan
        env:
          CANGJIE_NIGHTLY_API_KEY: ${{ secrets.CANGJIE_NIGHTLY_API_KEY }}
          CANGJIE_INCLUDE_NIGHTLY: ${{ github.event_name == 'schedule' || inputs.include_nightly }}
          CANGJIE_FORCE: ${{ inputs.force || false }}
        run: uv run cangjie-images plan --image "${IMAGE_NAME}"

  build:
    needs: analyze
    if: needs.analyze.outputs.has_work == 'true'
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJSON(needs.analyze.outputs.build_matrix) }}
    runs-on: ${{ matrix.runner }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4.0.0

      - name: Log in to Docker Hub
        uses: docker/login-action@v4.1.0
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push by digest
        id: build
        uses: docker/build-push-action@v7.1.0
        with:
          context: .
          file: ./Dockerfile
          platforms: ${{ matrix.platform }}
          outputs: type=image,name=${{ env.IMAGE_NAME }},push-by-digest=true,name-canonical=true,push=true
          provenance: false
          cache-from: type=gha,scope=${{ matrix.cache_scope }}
          cache-to: type=gha,scope=${{ matrix.cache_scope }},mode=max
          build-args: |
            BASE_IMAGE=${{ matrix.base_image }}
            BASE_FAMILY=${{ matrix.base_family }}
            CANGJIE_CHANNEL=${{ matrix.channel }}
            CANGJIE_VERSION=${{ matrix.version }}
            CANGJIE_ARCHIVE_URL=${{ matrix.archive_url }}
            CANGJIE_ARCHIVE_SHA256=${{ matrix.archive_sha256 }}
            CANGJIE_NATIVE_DIR=${{ matrix.native_dir }}
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.url=https://hub.docker.com/r/${{ env.IMAGE_NAME }}
            org.opencontainers.image.version=${{ matrix.version }}
            io.cangjie.channel=${{ matrix.channel }}
            io.cangjie.base=${{ matrix.base }}

      - name: Set up Python
        uses: actions/setup-python@v6.2.0
        with:
          python-version-file: .python-version

      - name: Install uv
        uses: astral-sh/setup-uv@v8.1.0
        with:
          enable-cache: true

      - name: Install project metadata tool
        run: uv sync --locked --dev

      - name: Write digest metadata
        run: |
          uv run cangjie-images write-digest \
            --output-dir digests \
            --release-id "${{ matrix.release_id }}" \
            --arch "${{ matrix.arch }}" \
            --digest "${{ steps.build.outputs.digest }}"

      - name: Upload digest metadata
        uses: actions/upload-artifact@v7.0.1
        with:
          name: digests-${{ matrix.release_id }}-${{ matrix.arch }}
          path: digests/*.json
          if-no-files-found: error
          retention-days: 7

  publish:
    needs: [analyze, build]
    if: needs.analyze.outputs.has_work == 'true'
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJSON(needs.analyze.outputs.publish_matrix) }}
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2

      - name: Set up Python
        uses: actions/setup-python@v6.2.0
        with:
          python-version-file: .python-version

      - name: Install uv
        uses: astral-sh/setup-uv@v8.1.0
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync --locked --dev

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4.0.0

      - name: Log in to Docker Hub
        uses: docker/login-action@v4.1.0
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Download digest metadata
        uses: actions/download-artifact@v8.0.1
        with:
          pattern: digests-${{ matrix.release_id }}-*
          path: digests
          merge-multiple: true

      - name: Create multi-arch tags
        env:
          RELEASE_ID: ${{ matrix.release_id }}
          TAGS_JSON: ${{ matrix.tags_json }}
          ARCHES_JSON: ${{ matrix.arches_json }}
        run: |
          uv run cangjie-images merge \
            --image "${IMAGE_NAME}" \
            --release-id "${RELEASE_ID}" \
            --tags-json "${TAGS_JSON}" \
            --arches-json "${ARCHES_JSON}" \
            --digests-dir digests
